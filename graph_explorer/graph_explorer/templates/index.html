{% extends "base.html" %}

{% block content %}
<div class="configuration-row">
    <div class="config-selector">
        <span class="label">Visualizer:</span>
        <div class="tabs">
            {% for plugin in visualizer_plugins %}
            <button
                class="tab-btn {% if plugin.identifier == selected_visualizer_plugin %}active{% endif %}"
                onclick="changeVisualizer('{{ plugin.identifier }}')">
                {{ plugin.name }}
            </button>
            {% endfor %}
        </div>
    </div>

    <div class="config-selector">
        <span class="label">Data Source:</span>
        <div class="tabs">
            {% for plugin in data_source_plugins %}
            <button
                class="tab-btn {% if plugin.identifier == selected_data_source_plugin %}active{% endif %}"
                onclick="changeDataSource('{{ plugin.identifier }}')">
                {{ plugin.name }}
            </button>
            {% endfor %}
        </div>
    </div>

    <div class="config-selector">
        <span class="label">Select data source file:</span>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="file" onchange="this.form.submit()">
        </form>
    </div>
</div>

<div id="graph-area">
    {{ graph_html|safe }}
</div>
{% endblock %}

{% block scripts %}
<script>
function changeVisualizer(identifier) {
    window.location.href = "?visualizer=" + identifier;
}
function changeDataSource(identifier) {
    window.location.href = "?datasource=" + identifier;
}

document.addEventListener("DOMContentLoaded", function() { 
  const svg = d3.select("#graph-area svg");

  let g = svg.select("g");

  const zoom = d3.behavior.zoom()
        .scaleExtent([0.5, 5])
        .on("zoom", function() {
            g.attr("transform",
                "translate(" + d3.event.translate[0] + "," + d3.event.translate[1] + ") " +
                "scale(" + d3.event.scale + ")");
        });

    svg.call(zoom);

    const nodes = g.selectAll(".node");

    nodes.on("mousedown", function() {
        d3.event.stopPropagation();
    });
})
</script>
{% endblock %}
